# Aeron — Kubernetes 部署 Manifests

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeron-app
  labels:
    app: aeron-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aeron-app
  template:
    metadata:
      labels:
        app: aeron-app
    spec:
      serviceAccountName: aeron-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: aeron-app:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: aeron-config
            - secretRef:
                name: aeron-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 3000
            failureThreshold: 30
            periodSeconds: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: aeron-app
spec:
  selector:
    app: aeron-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aeron-app
automountServiceAccountToken: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aeron-config
data:
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aeron-app-netpol
spec:
  podSelector:
    matchLabels:
      app: aeron-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: ingress
      ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              role: database
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              role: cache
      ports:
        - port: 6379
